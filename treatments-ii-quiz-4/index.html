                ...(typeof window.batch5Questions !== 'undefined' ? window.batch5Questions : [])
            ];
            return externalQuestions.length > 0 ? externalQuestions : fallbackBatch5;
        };

        const staticBank = loadStaticBank();

        const getModuleForTopic = (topic) => {
            const t = topic.toLowerCase();
            if (t.includes("respiratory") || t.includes("cardiovascular")) return "Quiz 1";
            if (t.includes("lower extremity") || t.includes("upper extremity") || t.includes("pregnancy") || t.includes("musculoskeletal") || t.includes("head, neck")) return "Quiz 2";
            if (t.includes("spinal") || t.includes("joint") || t.includes("autoimmune") || t.includes("headache") || t.includes("hand")) return "Quiz 3";
            if (t.includes("digestive") || t.includes("metabolic") || t.includes("nervous system") || t.includes("infant") || t.includes("condition")) return "Quiz 4";
            if (t.includes("oral practical") || t.includes("mock osce") || t.includes("capstone") || t.includes("advanced")) return "Oral Practical";
            return "Oral Practical"; 
        };

                            const mdPart = text.substring(splitIndex).trim();

                                const parsedData = JSON.parse(jsonPart);

                                    topic: "MT390 Conditions",
                                    difficulty: "Medium",
                                    question: `Which of the following describes the clinical findings and correct treatment parameters for ${item.condition}?`,
                                    options: [
                                        `${item.clinicalFindings} Treatment involves: ${item.treatment}`,
                                        `Condition primarily affects the ${item.referredRegion || 'extremities'}. Deep pressure is generally indicated everywhere.`,
                                        `Symptoms include severe structural deviations. Treatment: High-velocity manipulations.`,

                            }

                        }

                        console.error("Fetch error:", err);
                        setIsLoadingData(false);
                    });

                    setSelectedModules([...selectedModules, mod]);

                } else {
                    setSelectedDifficulties([...selectedDifficulties, diff]);
                }
            };

                let pool = fullMasterBank.filter(q => 
                    selectedModules.includes(getModuleForTopic(q.topic)) && 
                    selectedDifficulties.includes(q.difficulty)
                );

                    alert("No questions found matching these filters. Please broaden your selection.");

                    setUserAnswers({ ...userAnswers, [currentIndex]: optionIndex });
                    setIsAnswered(true);

                                <label className="block text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">Curriculum Modules</label>
                                <div className="flex flex-wrap gap-3">
                                    {['Quiz 1', 'Quiz 2', 'Quiz 3', 'Quiz 4', 'Oral Practical'].map(mod => (
                                        <button key={mod} onClick={() => handleModuleToggle(mod)} className={`px-5 py-2.5 rounded-xl font-medium border-2 transition-all ${selectedModules.includes(mod) ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}>
                                            {mod}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">Difficulty Level</label>
                                <div className="flex flex-wrap gap-3">
                                    {['Easy', 'Medium', 'Hard'].map(diff => {
                                        const colors = diff === 'Easy' ? 'green' : diff === 'Medium' ? 'orange' : 'red';
                                        const isSelected = selectedDifficulties.includes(diff);
                                        return (
                                            <button key={diff} onClick={() => handleDifficultyToggle(diff)} className={`px-5 py-2.5 rounded-xl font-medium border-2 transition-all ${isSelected ? `bg-${colors}-500 border-${colors}-500 text-white` : `bg-white border-${colors}-500 text-${colors}-700 hover:bg-${colors}-500 hover:text-white`}`}>
                                                {diff}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-8 pt-4 border-t border-slate-100">
                                <div>
                                    <label className="block text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">Question Count</label>
                                    <select value={sessionLength} onChange={(e) => setSessionLength(Number(e.target.value))} className="w-full bg-slate-50 border-2 border-slate-200 text-slate-900 text-lg font-medium rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3">
                                        <option value={5}>5 Questions</option>
                                        <option value={10}>10 Questions</option>
                                        <option value={25}>25 Questions</option>
                                        <option value={50}>50 Questions</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-900 uppercase tracking-wider mb-4">Testing Mode</label>
                                    <div className="flex gap-4">
                                        <button onClick={() => setIsExamMode(false)} className={`flex-1 py-3 px-4 rounded-xl font-bold border-2 transition-all ${!isExamMode ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-white border-slate-200 text-slate-400'}`}>
                                            Study <span className="block text-xs font-normal mt-1 opacity-80">Instant</span>
                                        </button>
                                        <button onClick={() => setIsExamMode(true)} className={`flex-1 py-3 px-4 rounded-xl font-bold border-2 transition-all ${isExamMode ? 'bg-purple-50 border-purple-500 text-purple-800' : 'bg-white border-slate-200 text-slate-400'}`}>
                                            Exam <span className="block text-xs font-normal mt-1 opacity-80">Blind</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="p-6 bg-slate-50 border-t border-slate-200">
                            <button onClick={startSession} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-md flex justify-center items-center gap-2">
                                <IconPlay size={20} /> Launch Simulator
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderQuiz = () => {
                const currentQ = activeQuestions[currentIndex];
                const hasAnswered = isExamMode ? userAnswers[currentIndex] !== undefined : isAnswered;

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex gap-3 items-center">
                                <span className={`px-3 py-1 text-xs font-bold uppercase tracking-wider rounded-lg ${!isExamMode ? 'bg-emerald-100 text-emerald-800' : 'bg-purple-100 text-purple-800'}`}>
                                    {!isExamMode ? 'Study Mode' : 'Exam Mode'}
                                </span>
                                <span className="text-sm font-semibold text-slate-500">Q {currentIndex + 1} of {activeQuestions.length}</span>
                            </div>
                            <button onClick={() => setView('dashboard')} className="text-slate-400 hover:text-slate-700">
                                <IconX size={24} />
                            </button>
                        </div>

                        <div className="bg-slate-200 h-2 w-full rounded-full mb-8 overflow-hidden">
                            <div className="bg-blue-600 h-2 transition-all duration-300" style={{ width: `${((currentIndex + 1) / activeQuestions.length) * 100}%` }}></div>
                        </div>

                        <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 animate-in fade-in duration-300">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="px-3 py-1 bg-slate-100 text-slate-600 text-sm font-bold rounded-full">{currentQ.topic}</span>
                            </div>
                            
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-900 mb-8 leading-tight">{currentQ.question}</h2>
                            
                            <div className="space-y-4">
                                {currentQ.options.map((option, idx) => {
                                    let btnClass = "bg-white border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                                    let icon = null;

                                    if (!isExamMode && isAnswered) {
                                        if (idx === currentQ.correctAnswer) {
                                            btnClass = "bg-emerald-50 border-emerald-500 text-emerald-900 ring-1 ring-emerald-500";
                                            icon = <IconCheck className="text-emerald-600 ml-auto flex-shrink-0" size={24} />;
                                        } else if (idx === userAnswers[currentIndex]) {
                                            btnClass = "bg-red-50 border-red-300 text-red-900 opacity-80";
                                            icon = <IconX className="text-red-500 ml-auto flex-shrink-0" size={24} />;
                                        } else {
                                            btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                                        }
                                    } else if (isExamMode && userAnswers[currentIndex] === idx) {
                                        btnClass = "bg-blue-50 border-blue-500 text-blue-900 ring-1 ring-blue-500";
                                    }

                                    return (
                                        <button key={idx} onClick={() => handleAnswerSelect(idx)} disabled={!isExamMode && isAnswered} className={`w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 flex items-center gap-4 ${btnClass}`}>
                                            <span className={`flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-full border text-sm font-bold ${(!isExamMode && isAnswered && idx === currentQ.correctAnswer) ? 'bg-emerald-500 border-emerald-600 text-white' : (!isExamMode && isAnswered && idx === userAnswers[currentIndex]) ? 'bg-red-500 border-red-600 text-white' : (isExamMode && userAnswers[currentIndex] === idx) ? 'bg-blue-600 border-blue-700 text-white' : 'bg-slate-100 border-slate-300 text-slate-500'}`}>
                                                {String.fromCharCode(65 + idx)}
                                            </span>
                                            <span className="flex-1 font-medium text-lg leading-snug">{option}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>

                            {!isExamMode && isAnswered && (
                                <div className={`mt-8 p-6 rounded-2xl border ${userAnswers[currentIndex] === currentQ.correctAnswer ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200'} animate-in slide-in-from-bottom-4 duration-500`}>
                                    <div className="flex items-start gap-4">
                                        <IconAlert className={`mt-1 flex-shrink-0 ${userAnswers[currentIndex] === currentQ.correctAnswer ? 'text-emerald-600' : 'text-slate-500'}`} size={24} />
                                        <div>
                                            <h4 className={`font-bold mb-2 text-lg ${userAnswers[currentIndex] === currentQ.correctAnswer ? 'text-emerald-900' : 'text-slate-800'}`}>Evidence-Based Rationale</h4>
                                            <p className={`text-base leading-relaxed ${userAnswers[currentIndex] === currentQ.correctAnswer ? 'text-emerald-800' : 'text-slate-600'}`}>{currentQ.rationale}</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {hasAnswered && (
                                <div className="mt-8 flex justify-end">
                                    <button onClick={nextQuestion} className="bg-slate-900 hover:bg-slate-800 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-md flex items-center gap-2 text-lg">
                                        {currentIndex === activeQuestions.length - 1 ? 'View Results' : 'Next Question'}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderResults = () => {
                let score = 0;
                activeQuestions.forEach((q, idx) => { if (userAnswers[idx] === q.correctAnswer) score++; });
                const percentage = Math.round((score / activeQuestions.length) * 100);

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 animate-in zoom-in-95 duration-500">
                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-200 text-center mb-8">
                            <div className="w-24 h-24 mx-auto bg-blue-50 rounded-full flex items-center justify-center mb-6">
                                <IconCheck className="text-blue-600" size={48} />
                            </div>
                            <h2 className="text-4xl font-extrabold text-slate-900 mb-4">Diagnostic Complete</h2>
                            <div className="flex justify-center gap-6 mb-8">
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 min-w-[140px]">
                                    <div className="text-sm text-slate-500 font-bold uppercase tracking-wider mb-2">Final Grade</div>
                                    <div className={`text-5xl font-black ${percentage >= 70 ? 'text-emerald-600' : 'text-red-500'}`}>{percentage}%</div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 min-w-[140px]">
                                    <div className="text-sm text-slate-500 font-bold uppercase tracking-wider mb-2">Raw Score</div>
                                    <div className="text-5xl font-black text-slate-800">{score}<span className="text-2xl text-slate-400">/{activeQuestions.length}</span></div>
                                </div>
                            </div>
                            <button onClick={() => setView('dashboard')} className="bg-slate-900 hover:bg-slate-800 text-white px-10 py-4 rounded-xl font-bold transition-all shadow-md inline-flex items-center gap-2 text-lg">
                                <IconHome size={20} /> Return to Dashboard
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <main>
                    {view === 'dashboard' && renderDashboard()}
                    {view === 'guide' && renderStudyGuide()}
                    {view === 'config' && renderConfigurator()}
                    {view === 'quiz' && renderQuiz()}
                    {view === 'results' && renderResults()}
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
